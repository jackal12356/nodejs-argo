<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>守护动物 · 共建家园</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft YaHei",sans-serif;
    background:url("https://images.unsplash.com/photo-1474511320723-9a56873867b5") center/cover fixed;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.45);
    min-height:100vh;
    padding:30px;
}

.header{
    text-align:center;
    margin-top:20px;
}

.header h1{
    font-size:3rem;
    margin-bottom:10px;
}

.header p{
    font-size:1.2rem;
}

.search-box{
    margin:40px auto;
    max-width:600px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    font-size:18px;
}

.animals{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(6px);
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    line-height:1.6;
}

.action{
    text-align:center;
    margin:50px 0;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:#4CAF50;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-size:18px;
}

.footer{
    text-align:center;
    margin-top:50px;
    padding:20px;
    color:#ddd;
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
    <h1>🐾 守护动物 · 共建家园</h1>
    <p>保护野生动物，就是保护人类共同的未来</p>
</div>

<div class="search-box">
    <input type="text" placeholder="搜索动物知识...">
</div>

<div class="animals">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1564349683136-77e08dba1ef7">
        <div class="card-content">
            <h3>大熊猫</h3>
            <p>
                大熊猫是中国国宝，也是全球生物多样性保护的重要象征。
            </p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d">
        <div class="card-content">
            <h3>东北虎</h3>
            <p>
                东北虎是世界上体型最大的猫科动物之一，数量极其稀少。
            </p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a">
        <div class="card-content">
            <h3>亚洲象</h3>
            <p>
                森林减少和栖息地破坏正在威胁亚洲象的生存。
            </p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501706362039-c6e80948f11f">
        <div class="card-content">
            <h3>雪豹</h3>
            <p>
                雪豹生活在高寒山区，被誉为“雪山之王”。
            </p>
        </div>
    </div>

</div>

<div class="action">
    <a href="#" class="btn">加入动物保护行动</a>
</div>

<div class="footer">
    © 2026 Animal Protection Foundation · 爱护生命，尊重自然
</div>

</div>

</body>
</html>
